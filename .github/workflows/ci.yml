name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          if find . -name "*.py" -not -path "./.venv/*" | grep -q .; then
            ruff check .
          else
            echo "No Python source files yet — skipping ruff lint"
          fi

      - name: Format check
        run: |
          if find . -name "*.py" -not -path "./.venv/*" | grep -q .; then
            ruff format --check .
          else
            echo "No Python source files yet — skipping ruff format check"
          fi

      - name: Type check
        run: |
          if find . -name "*.py" -not -path "./.venv/*" | grep -q .; then
            mypy .
          else
            echo "No Python source files yet — skipping mypy"
          fi

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          # Probe for tests without failing the step if none are found yet.
          # Exit code 5 = "no tests collected" — valid while this is the
          # first PR (CI bootstrap). Once test files exist, the full suite
          # runs with 90% coverage enforced as required by the issue spec.
          set +e
          pytest --collect-only -q
          COLLECT_EXIT=$?
          set -e

          if [ "$COLLECT_EXIT" -eq 5 ]; then
            # Determine whether any test files actually exist
            if find . -name "test_*.py" | grep -q .; then
              echo "pytest could not discover tests even though test files exist"
              echo "Check pytest configuration or test naming"
              exit 1
            else
              echo "No tests exist yet — skipping pytest (expected during CI bootstrap)"
            fi
          elif [ "$COLLECT_EXIT" -ne 0 ]; then
            echo "pytest --collect-only failed with unexpected exit code $COLLECT_EXIT"
            exit "$COLLECT_EXIT"
          else
            pytest -v \
              --cov=amip \
              --cov-report=term-missing \
              --cov-fail-under=90
          fi

  security:
    name: Security scan
    runs-on: ubuntu-24.04
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        # Install the full dev set so pip-audit covers all project dependencies,
        # not just the security tools themselves.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Audit dependencies
        # --skip-editable ignores the local package (not on PyPI yet).
        # Runs once here rather than in every job to avoid redundant scans.
        run: pip-audit --skip-editable

      - name: Static security scan
        run: |
          if find . -name "*.py" -not -path "./.venv/*" | grep -q .; then
            bandit -r . -c pyproject.toml
          else
            echo "No Python source files yet — skipping bandit scan"
          fi

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    needs: quality

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
