name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          if find . -name "*.py" -not -path "./.venv/*" | grep -q .; then
            ruff check .
          else
            echo "No Python source files yet — skipping ruff lint"
          fi

      - name: Format check
        run: |
          if find . -name "*.py" -not -path "./.venv/*" | grep -q .; then
            ruff format --check .
          else
            echo "No Python source files yet — skipping ruff format check"
          fi

      - name: Type check
        run: |
          if find . -name "*.py" -not -path "./.venv/*" -not -path "./build/*" | grep -q .; then
            mypy amip/
          else
            echo "No Python source files yet — skipping mypy"
          fi

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest -v --cov=. --cov-report=term-missing || echo "No tests yet"

  security:
    name: Security scan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          pip install pip-audit bandit[toml]

      - name: Audit dependencies
        run: pip-audit

      - name: Static security scan
        run: bandit -r . -c pyproject.toml

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
